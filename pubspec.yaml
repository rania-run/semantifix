name: semantifix
description: >-
  SemantiFix — a professional CLI tool for detecting and AI-fixing accessibility
  violations in Flutter/Dart source files.
version: 0.1.1
repository: https://github.com/rania-run/semantifix
issue_tracker: https://github.com/rania-run/semantifix/issues
topics:
  - flutter
  - accessibility
  - a11y
  - linter
  - cli

environment:
  sdk: ">=3.4.0 <4.0.0"

executables:
  sfix: main

dependencies:
  analyzer: ">=10.2.0 <13.0.0"
  args: ^2.7.0
  http: ^1.6.0
  path: ^1.9.1
  collection: ^1.19.1

dev_dependencies:
  test: ^1.30.0
  lints: ^6.1.0

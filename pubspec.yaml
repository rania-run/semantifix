name: semantifix
description: >-
  SemantiFix — a professional CLI tool for detecting and AI-fixing accessibility
  violations in Flutter/Dart source files.
version: 0.1.0
repository: https://github.com/your-org/semantifix

environment:
  sdk: ">=3.4.0 <4.0.0"

executables:
  sfix: main

dependencies:
  analyzer: ^10.2.0
  args: ^2.7.0
  http: ^1.6.0
  path: ^1.9.1
  collection: ^1.19.1

dev_dependencies:
  test: ^1.30.0
  build_runner: ^2.12.2
  lints: ^6.1.0

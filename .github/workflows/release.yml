name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section for this version
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          notes=$(python3 - <<EOF
          import re, sys
          content = open('CHANGELOG.md').read()
          match = re.search(r'## ' + re.escape("$version") + r'\n(.*?)(?=\n## |\Z)', content, re.DOTALL)
          print(match.group(1).strip() if match else '_No changelog entry found for this version._')
          EOF
          )
          echo "notes<<ENDOFNOTES" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "ENDOFNOTES" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
